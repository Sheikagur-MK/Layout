<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HG Studios | Vision AI V7.6</title>
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/opencv.js/4.5.4/opencv.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --neon: #39ff14; --blue: #00d2ff; --bg: #0a0a0c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; overflow: hidden; }
        #loading { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 3px solid #222; border-top-color: var(--neon); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ui-panel { position: absolute; top: 15px; left: 15px; background: rgba(15,15,20,0.9); padding: 15px; border-radius: 12px; border: 1px solid var(--blue); z-index: 100; }
        canvas { border: 1px solid #333; }
    </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p style="margin-top:20px; color:var(--neon)">CONECTANDO A HG SERVER...</p></div>

<div class="ui-panel">
    <h2 style="margin:0; color:var(--neon); font-size:16px;">HG STUDIOS V7.6</h2>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <button onclick="document.getElementById('fileInput').click()" style="margin-top:10px; background:var(--blue); border:none; padding:10px; width:100%; border-radius:6px; font-weight:bold; cursor:pointer;">CARGAR PLANO</button>
    <button onclick="enviarAMongo()" style="margin-top:5px; background:var(--neon); border:none; padding:10px; width:100%; border-radius:6px; font-weight:bold; cursor:pointer;">GUARDAR EN DB</button>
</div>

<canvas id="c"></canvas>

<script>
    let canvas, isAiReady = false;

    // Verificar carga de motor
    let interval = setInterval(() => {
        if (typeof cv !== 'undefined' && cv.Mat) {
            isAiReady = true;
            document.getElementById('loading').style.display = 'none';
            initApp();
            clearInterval(interval);
        }
    }, 500);

    function initApp() {
        canvas = new fabric.Canvas('c', {
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#000'
        });
    }

    // Función para guardar en tu MongoDB
    async function enviarAMongo() {
        const layoutData = {
            nombre: "Layout_" + Date.now(),
            datos: canvas.toJSON()
        };
        const res = await fetch('/api/save-layout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(layoutData)
        });
        const data = await res.json();
        if(data.exito) alert("¡Guardado en MongoDB exitosamente!");
    }

    document.getElementById('fileInput').onchange = (e) => {
        let reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                    scaleX: canvas.width / img.width,
                    scaleY: canvas.height / img.height
                });
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };
</script>
</body>
</html>
